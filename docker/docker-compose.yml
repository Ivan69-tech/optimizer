services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: optimizer
      POSTGRES_PASSWORD: optimizer
      POSTGRES_DB: optimizer
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimizer"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Service d'optimisation (API REST) ───────────────────────────────────────
  # L'image doit être construite au préalable via :
  #   docker build -t tewa/optimizer:latest -f docker/Dockerfile .
  optimizer-service:
    image: tewa/optimizer:latest
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
