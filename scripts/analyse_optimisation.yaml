# Configuration du script d'analyse de trajectoire BESS
# Adapter ces valeurs avant de lancer le script.

# Site à analyser
site_id: "site-demo-01"
soe_actuel_kwh: 100.0 # État de charge initial de la batterie (kWh)
capacite_bess_kwh: 500 # Capacité totale de la batterie (kWh)

# Connexion au service d'optimisation
optimizer_url: "http://localhost:8080"

# Connexion à la base de données PostgreSQL (pour récupérer les prévisions)
database_url: "postgresql://forecaster:forecaster@server-spotapi:5432/forecaster"
prix_spot_defaut_eur_mwh: 80.0 # Prix fallback si absent en DB (EUR/MWh)

# Sortie
output_html: "analyse_trajectoire.html"
ouvrir_navigateur: true # Ouvrir le rapport automatiquement dans le navigateur
